<!-- ============================================================
     KHỐI THEO DÕI SALES ETSY — chèn vào index.html
     - Đặt đoạn HTML này vào chỗ bạn muốn hiển thị (vd: trong 1 tab).
     - Sửa hàm getSession() bên dưới cho khớp cách bạn lưu session
       ở các phần khác của app (thường là localStorage).
     ============================================================ -->

<div id="etsySalesBox" style="max-width:960px;margin:0 auto;font-family:system-ui,sans-serif;color:#222;">
  <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">Theo dõi Sales các shop Etsy</h2>
  <p style="color:#777;font-size:13px;margin-bottom:16px;">
    Quét tổng sales từ trang shop Etsy, tính số đơn mới mỗi ngày. Chạy tự động hằng ngày (cron) hoặc bấm "Chạy ngay".
  </p>

  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <button onclick="esAddRow()"   style="padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;">+ Thêm shop</button>
    <button onclick="esSaveShops()" style="padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;">Lưu danh sách</button>
    <button onclick="esRunNow()"   style="padding:8px 14px;border-radius:8px;border:none;background:#f1641e;color:#fff;font-weight:600;cursor:pointer;">▶ Chạy ngay</button>
    <button onclick="esLoad()"     style="padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;">↻ Tải lại</button>
  </div>
  <div id="esMsg" style="color:#555;font-size:13px;margin:6px 0 14px;"></div>

  <div style="font-size:16px;font-weight:600;margin:8px 0 10px;">Danh sách shop</div>
  <table style="width:100%;border-collapse:collapse;margin-bottom:28px;font-size:14px;">
    <thead>
      <tr>
        <th style="padding:8px;text-align:left;background:#f6f6f6;border-bottom:2px solid #eee;">Tên shop</th>
        <th style="padding:8px;text-align:left;background:#f6f6f6;border-bottom:2px solid #eee;">URL Etsy</th>
        <th style="padding:8px;text-align:center;background:#f6f6f6;border-bottom:2px solid #eee;width:70px;">Active</th>
        <th style="padding:8px;background:#f6f6f6;border-bottom:2px solid #eee;width:40px;"></th>
      </tr>
    </thead>
    <tbody id="esShopRows"></tbody>
  </table>

  <div style="font-size:16px;font-weight:600;margin:8px 0 10px;">
    Lịch sử <span id="esHistCount" style="display:inline-block;padding:2px 10px;border-radius:12px;background:#fff3ec;color:#f1641e;font-weight:600;"></span>
  </div>
  <table style="width:100%;border-collapse:collapse;font-size:14px;">
    <thead>
      <tr>
        <th style="padding:8px;text-align:left;background:#f6f6f6;border-bottom:2px solid #eee;">Ngày</th>
        <th style="padding:8px;text-align:left;background:#f6f6f6;border-bottom:2px solid #eee;">Shop</th>
        <th style="padding:8px;text-align:right;background:#f6f6f6;border-bottom:2px solid #eee;">Đơn hôm đó</th>
        <th style="padding:8px;text-align:right;background:#f6f6f6;border-bottom:2px solid #eee;">Tổng sales</th>
      </tr>
    </thead>
    <tbody id="esHistRows"></tbody>
  </table>
</div>

<script>
// ====== SỬA CHỖ NÀY cho khớp app của bạn ======
// Trả về chuỗi session để gửi qua header X-Session.
// Nếu app bạn lưu session ở localStorage tên khác, đổi 'session' thành tên đúng.
function esGetSession() {
  return localStorage.getItem('session')
      || localStorage.getItem('X-Session')
      || localStorage.getItem('token')
      || '';
}
// ===============================================

let esShops = [];

function esHeaders(json) {
  const h = { 'X-Session': esGetSession() };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

function esSetMsg(t) { document.getElementById('esMsg').textContent = t || ''; }

async function esLoad() {
  esSetMsg('Đang tải...');
  try {
    const r = await fetch('/api/etsy-sales?action=shops', { headers: esHeaders() });
    const d = await r.json();
    if (!d.ok) { esSetMsg(d.error || d.message || 'Lỗi tải.'); return; }
    esShops = (d.shops && d.shops.length) ? d.shops : [{ name:'', url:'', active:true }];
    esRenderShops();
    esRenderHistory(d.history || []);
    esSetMsg('');
  } catch (e) { esSetMsg('Lỗi kết nối: ' + e.message); }
}

function esRenderShops() {
  const tb = document.getElementById('esShopRows');
  tb.innerHTML = '';
  esShops.forEach((s, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td style="padding:4px;border-bottom:1px solid #f0f0f0;"><input value="'+(s.name||'').replace(/"/g,'&quot;')+'" oninput="esShops['+i+'].name=this.value" placeholder="NeoPaws" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;"></td>' +
      '<td style="padding:4px;border-bottom:1px solid #f0f0f0;"><input value="'+(s.url||'').replace(/"/g,'&quot;')+'" oninput="esShops['+i+'].url=this.value" placeholder="https://www.etsy.com/shop/NeoPaws" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;"></td>' +
      '<td style="padding:4px;border-bottom:1px solid #f0f0f0;text-align:center;"><input type="checkbox" '+(s.active!==false?'checked':'')+' onchange="esShops['+i+'].active=this.checked"></td>' +
      '<td style="padding:4px;border-bottom:1px solid #f0f0f0;"><button onclick="esRemoveRow('+i+')" style="padding:2px 8px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;">×</button></td>';
    tb.appendChild(tr);
  });
}

function esRenderHistory(history) {
  const tb = document.getElementById('esHistRows');
  const total = history.reduce((s,h)=>s+(Number(h.ordersToday)||0),0);
  document.getElementById('esHistCount').textContent = history.length + ' dòng · ' + total + ' đơn';
  tb.innerHTML = '';
  if (!history.length) {
    tb.innerHTML = '<tr><td colspan="4" style="padding:8px;border-bottom:1px solid #f0f0f0;">Chưa có dữ liệu. Bấm "Chạy ngay" để quét lần đầu (lần đầu cột Đơn = tổng sales làm baseline).</td></tr>';
    return;
  }
  history.forEach(h => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td style="padding:8px;border-bottom:1px solid #f0f0f0;">'+h.dateOnly+'</td>' +
      '<td style="padding:8px;border-bottom:1px solid #f0f0f0;">'+h.shopName+'</td>' +
      '<td style="padding:8px;border-bottom:1px solid #f0f0f0;text-align:right;font-weight:600;">'+h.ordersToday+'</td>' +
      '<td style="padding:8px;border-bottom:1px solid #f0f0f0;text-align:right;">'+h.totalSales+'</td>';
    tb.appendChild(tr);
  });
}

function esAddRow() { esShops.push({ name:'', url:'', active:true }); esRenderShops(); }
function esRemoveRow(i) { esShops.splice(i,1); esRenderShops(); }

async function esSaveShops() {
  esSetMsg('Đang lưu...');
  try {
    const r = await fetch('/api/etsy-sales?action=save', {
      method:'POST', headers: esHeaders(true), body: JSON.stringify({ shops: esShops })
    });
    const d = await r.json();
    if (d.ok) { esShops = d.shops; esRenderShops(); esSetMsg('Đã lưu '+d.shops.length+' shop hợp lệ.'); }
    else esSetMsg(d.error || 'Lỗi khi lưu.');
  } catch (e) { esSetMsg('Lỗi: ' + e.message); }
}

async function esRunNow() {
  esSetMsg('Đang quét sales... (có thể mất 10–30s tuỳ số shop)');
  try {
    const r = await fetch('/api/etsy-sales?action=run', { headers: esHeaders() });
    const d = await r.json();
    esSetMsg(d.ok ? d.message : ('Lỗi: ' + (d.message || d.error)));
    esLoad();
  } catch (e) { esSetMsg('Lỗi: ' + e.message); }
}

// Tự tải khi mở trang. Nếu bạn dùng tab, gọi esLoad() khi mở tab thay cho dòng này.
esLoad();
</script>
